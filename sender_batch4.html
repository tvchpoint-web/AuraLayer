function toHtml(text){var html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');html=html.replace(/(https?:\/\/[^\s]+)/g,function(url){var clean=url.replace(/[.,;:!?)]+$/,'');var trail=url.slice(clean.length);return'<a href="'+clean+'" style="color:#C9A84C;text-decoration:none">'+clean+'</a>'+trail;});html='<p style="margin:0 0 14px">'+html.replace(/\n\n/g,'</p><p style="margin:0 0 14px">').replace(/\n/g,'<br>')+'</p>';return'<div style="font-family:Arial,sans-serif;font-size:15px;line-height:1.7;color:#111111;max-width:580px">'+html+'</div>';}
function updateProgress(){var sent=sentSet.size,total=drafts.length;document.getElementById('progressText').textContent=sent+' / '+total+' sent';document.getElementById('progressFill').style.width=Math.round(sent/total*100)+'%';document.getElementById('countBadge').textContent=(total-sent)+' remaining';}
function renderList(){document.getElementById('draftList').innerHTML=drafts.map(function(d,i){return'<div class="draft-item'+(selectedIdx===i?' selected':'')+(sentSet.has(i)?' sent':'')+'" onclick="selectDraft('+i+')">'+'<div class="tier-dot '+d.tier+'"></div>'+'<div class="draft-info"><div class="draft-to">'+d.to+(sentSet.has(i)?'<span class="sent-tag">sent</span>':'')+'</div><div class="draft-subj">'+d.subject+'</div></div></div>';}).join('');updateProgress();}
function selectDraft(i){if(sentSet.has(i))return;selectedIdx=i;renderList();var d=drafts[i];document.getElementById('toField').value=d.to;document.getElementById('subjectField').value=d.subject;document.getElementById('bodyField').value=d.body;document.getElementById('composePanel').style.display='block';document.getElementById('status').style.display='none';document.getElementById('sendBtn').textContent='Send via Resend';document.getElementById('sendBtn').disabled=false;}
async function sendEmail(){var to=document.getElementById('toField').value.trim();var subject=document.getElementById('subjectField').value.trim();var plain=document.getElementById('bodyField').value.trim();var fromName=document.getElementById('fromName').value.trim()||'Manny A.';if(!to||!subject||!plain){showStatus('error','Fill in all fields.');return;}var btn=document.getElementById('sendBtn');btn.disabled=true;btn.textContent='Sending...';showStatus('loading','Sending...');try{var res=await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:to,subject:subject,fromName:fromName,html:toHtml(plain),text:plain})});var data=await res.json();if(res.ok&&data.success){showStatus('success','Sent to '+to);sentSet.add(selectedIdx);renderList();btn.textContent='Sent!';setTimeout(function(){btn.disabled=false;btn.textContent='Send via Resend';document.getElementById('composePanel').style.display='none';},2000);}else{showStatus('error',data.error||'Send failed.');btn.disabled=false;btn.textContent='Send via Resend';}}catch(e){showStatus('error','Error: '+e.message);btn.disabled=false;btn.textContent='Send via Resend';}}
