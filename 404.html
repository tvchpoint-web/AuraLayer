<style>
:root {
  --black:    #F5EFE4;
  --black-2:  #EDE7DB;
  --black-3:  #E5DDD0;
  --gold:     #C9922A;
  --gold-lt:  #E8B84A;
  --gold-dim: rgba(201,146,42,0.12);
  --gold-g:   rgba(201,146,42,0.1);
  --gold-gs:  rgba(201,146,42,0.18);
  --cream:    #FFF8EC;
  --white:    #1A1510;
  --white-d:  #5A4E40;
  --white-m:  #8A7E70;
  --border:   rgba(201,146,42,0.25);
  --border-d: rgba(0,0,0,0.07);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px;
  overflow: hidden;
}
body::after {
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.18;
}
.glow {
  position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
  width:800px;height:500px;
  background:radial-gradient(ellipse,rgba(201,146,42,0.07) 0%,transparent 65%);
  pointer-events:none;
  animation:glowPulse 7s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}

.logo {
  display:inline-flex;align-items:center;gap:10px;
  text-decoration:none;margin-bottom:52px;
  opacity:0;animation:fadeUp .6s ease .05s forwards;
}
.logo-bars{display:flex;flex-direction:column;gap:3px;align-items:flex-start;flex-shrink:0;}
.logo-wordmark{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1;}

.chip {
  display:inline-flex;align-items:center;gap:8px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--gold);
  border:1px solid var(--border);
  padding:7px 18px;background:var(--gold-g);
  margin-bottom:32px;
  opacity:0;animation:fadeUp .6s ease .1s forwards;
}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

h1 {
  font-family:'Syne',sans-serif;
  font-size:clamp(34px,5.5vw,64px);
  font-weight:800;line-height:1.05;
  letter-spacing:-2px;margin-bottom:14px;
  color:var(--white);
  opacity:0;animation:fadeUp .6s ease .16s forwards;
}
h1 em{color:var(--gold);font-style:italic;font-weight:800;}

.tagline {
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:2.5px;text-transform:uppercase;
  color:var(--white-m);margin-bottom:18px;
  opacity:0;animation:fadeUp .6s ease .2s forwards;
}

.sub {
  font-size:15px;color:var(--white-d);
  max-width:380px;margin:0 auto 48px;line-height:1.85;
  opacity:0;animation:fadeUp .6s ease .24s forwards;
}

.cta {
  display:inline-flex;align-items:center;gap:10px;
  background:var(--gold);color:#fff;
  text-decoration:none;padding:13px 32px;
  font-size:11px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;
  font-family:'DM Sans',sans-serif;
  transition:background .2s,transform .15s;
  margin-bottom:52px;
  opacity:0;animation:fadeUp .6s ease .3s forwards;
}
.cta:hover{background:var(--gold-lt);transform:translateY(-2px);}

/* LOADING BARS COUNTDOWN */
.bars-countdown {
  display:flex;flex-direction:column;gap:10px;
  align-items:flex-start;
  opacity:0;animation:fadeUp .6s ease .38s forwards;
}
.bc-row { display:flex;flex-direction:column;gap:0; }
.bc-track {
  height:4px;border-radius:20px;
  background:rgba(201,146,42,0.15);
  overflow:hidden;
}
.bc-fill {
  height:100%;width:0%;border-radius:20px;
  background:linear-gradient(90deg,#F0D080,#C9922A);
  transition:width 1s linear;
}
.bc-row:nth-child(1) .bc-track { width:160px; }
.bc-row:nth-child(2) .bc-track { width:116px; }
.bc-row:nth-child(2) .bc-fill { opacity:0.65; }
.bc-row:nth-child(3) .bc-track { width:72px; }
.bc-row:nth-child(3) .bc-fill { background:#C9A84A;opacity:0.45; }
.bc-label {
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--white-m);margin-top:12px;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){h1{font-size:32px;letter-spacing:-1px;}}
</style>
</head>
<body>
<div class="glow"></div>

<a href="https://auralayer.ai" class="logo">
  <span class="logo-bars">
    <span style="display:block;width:22px;height:4px;background:linear-gradient(90deg,#E8C96B,#C9922A);border-radius:10px;opacity:1;"></span>
    <span style="display:block;width:16px;height:4px;background:linear-gradient(90deg,#E8C96B,#C9922A);border-radius:10px;opacity:.65;"></span>
    <span style="display:block;width:10px;height:4px;background:#A07518;border-radius:10px;opacity:.35;"></span>
  </span>
  <span class="logo-wordmark">
    <span style="color:var(--white);">Aura</span><span style="color:var(--gold);">Layer.ai</span>
  </span>
</a>

<div class="chip"><span class="chip-dot"></span>Back in a moment</div>

<h1>Your voice isn't<br><em>going anywhere.</em></h1>

<p class="tagline">Same AI tools. Your voice. Every time.</p>

<p class="sub">My AuraLayer is being updated. The missing layer that makes every tool sound like you will be right back.</p>

<a href="https://auralayer.ai" class="cta">Back to AuraLayer.ai →</a>

<!-- LOADING BARS -->
<div class="bars-countdown">
  <div class="bc-row"><div class="bc-track"><div class="bc-fill" id="bar1"></div></div></div>
  <div class="bc-row"><div class="bc-track"><div class="bc-fill" id="bar2"></div></div></div>
  <div class="bc-row"><div class="bc-track"><div class="bc-fill" id="bar3"></div></div></div>
  <p class="bc-label" id="bc-label">Redirecting in 10s</p>
</div>

<script>
var TOTAL = 10;
var t = TOTAL;
var fills = [
  document.getElementById('bar1'),
  document.getElementById('bar2'),
  document.getElementById('bar3')
];
var label = document.getElementById('bc-label');

function setBars(elapsed) {
  var pct = (elapsed / TOTAL * 100) + '%';
  fills[0].style.width = pct;
  fills[1].style.width = pct;
  fills[2].style.width = pct;
}

// Kick off — slight delay so CSS transition is visible from 0
setTimeout(function(){ setBars(1); }, 80);

var elapsed = 1;
var iv = setInterval(function(){
  elapsed++;
  t--;
  setBars(elapsed);
  label.textContent = 'Redirecting in ' + t + 's';
  if(t <= 0){
    clearInterval(iv);
    window.location.href = 'https://auralayer.ai';
  }
}, 1000);
</script>
</body>
