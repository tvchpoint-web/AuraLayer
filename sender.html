<style>

  .field input, .field textarea { width: 100%; font-size: 13px; color: #F0EDE4; background: #08080D; border: 1px solid #222228; border-radius: 8px; padding: 9px 12px; outline: none; transition: border-color 0.15s; font-family: Arial, sans-serif; }
  .field input:focus, .field textarea:focus { border-color: #C9A84C; }
  .field textarea { min-height: 220px; resize: vertical; line-height: 1.6; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .send-btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; background: #C9A84C; color: #08080D; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }

  .status { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .status.success { background: rgba(29,158,117,0.15); color: #1D9E75; border: 1px solid rgba(29,158,117,0.3); display: block; }
  .status.error { background: rgba(226,75,74,0.15); color: #E24B4A; border: 1px solid rgba(226,75,74,0.3); display: block; }
  .status.loading { background: rgba(201,168,76,0.1); color: #C9A84C; border: 1px solid rgba(201,168,76,0.2); display: block; }
  .divider { font-size: 11px; color: #444; padding: 10px 16px; background: #0d0d12; border-bottom: 1px solid #1a1a20; }

<body>

  <div class="panel" id="composePanel" style="display:none">
    <div class="divider">Compose — all fields editable</div>
    <div class="compose">
      <div class="row2">
        <div class="field"><label>To</label><input type="email" id="toField" placeholder="recipient@example.com"></div>

      </div>
      <div class="field"><label>Subject</label><input type="text" id="subjectField"></div>
      <div class="field"><label>Body</label><textarea id="bodyField"></textarea></div>
      <button class="send-btn" id="sendBtn" onclick="sendEmail()">Send via Resend</button>
      <div class="status" id="status"></div>
    </div>

  {to:'founders@tldr.tech',subject:'Pitch for TLDR Founders: AuraLayer.ai — AI stack orchestration, launching May 1',body:'Hi TLDR Founders team,\n\nPitching AuraLayer.ai for your founders-focused edition — a no-code AI tool orchestration platform closing beta April 30th and launching May 1, 2026.\n\nThe founders angle: we are a small team who felt the gap and built the solution. Most founders today juggle 5-10 AI tools with no way to connect them. AuraLayer layers them into one automated workflow — no code required.\n\nBeta is live now at https://auralayer.ai/app\nDeck at https://auralayer.ai/deck\n\nBeta closes April 30th — would love a feature before launch.\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},

  {to:'hibt@npr.org',subject:'Guest pitch: AuraLayer.ai team — small founders, big market gap, built from zero',body:'Hi How I Built This team,\n\nPitching the team behind AuraLayer.ai as guests — built from scratch by a small group of founders who felt something was genuinely missing.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'ideas@myfirstmillion.com',subject:'Business idea pitch for MFM: AuraLayer.ai — the orchestration layer for every AI tool',body:'Hi My First Million team,\n\nPitching AuraLayer.ai as a business idea worth discussing — SaaS that solves coordination between AI tools. Sticky, high-margin, defensible.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'hello@thesaaspodcast.com',subject:'Podcast guest pitch: AuraLayer.ai — small team, saw a gap, built the solution, launching May 1',body:'Hi The SaaS Podcast team,\n\nPitching AuraLayer.ai as a guest story — small team, felt the gap, built a no-code AI orchestration platform, launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},

  {to:'info@a16z.com',subject:'Startup introduction: AuraLayer.ai — AI orchestration infrastructure for the non-technical user',body:'Hi a16z team,\n\nIntroducing AuraLayer.ai — no-code AI tool orchestration launching May 1, 2026. Addresses the next major infrastructure gap in AI productivity.\n\nDeck: https://auralayer.ai/deck\nProduct: https://auralayer.ai\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'info@sequoiacap.com',subject:'Startup introduction: AuraLayer.ai — consumer AI orchestration infrastructure',body:'Hi Sequoia team,\n\nIntroducing AuraLayer.ai — consumer-level AI orchestration infrastructure launching May 1, 2026.\n\nDeck: https://auralayer.ai/deck\nProduct: https://auralayer.ai\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},

  {to:'hello@every.to',subject:'Story pitch: AuraLayer.ai — the orchestration layer the AI stack has been missing',body:'Hi Every team,\n\nPitching AuraLayer.ai for your knowledge worker audience — the orchestration layer the AI stack has been missing, launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'aireporter@theinformation.com',subject:'AI beat pitch: AuraLayer.ai — first consumer-level AI orchestration platform',body:'Hi The Information AI reporter,\n\nTargeted pitch for your AI tools beat — AuraLayer.ai, first consumer-level AI orchestration platform, launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'hiten@hitenshah.com',subject:'SaaS Weekly pitch: AuraLayer.ai — AI orchestration, launching May 1',body:'Hi Hiten,\n\nLong-time admirer of your work. Reaching out about AuraLayer.ai — no-code AI orchestration launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},

  {to:'trends@thehustle.co',subject:'Business trend pitch: AuraLayer.ai — consumer AI orchestration, an emerging category',body:'Hi The Hustle team,\n\nSubmitting AuraLayer.ai as a business trend — consumer AI orchestration as an emerging category, launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'hello@explodingtopics.com',subject:'Trend submission: Consumer AI orchestration — AuraLayer.ai as the category example',body:'Hi Exploding Topics team,\n\nSubmitting consumer AI orchestration as a trend — AuraLayer.ai as the category example, launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'hello@sidehustlenation.com',subject:'Tool + affiliate pitch: AuraLayer.ai — AI orchestration for online business builders',body:'Hi Side Hustle Nation team,\n\nPitching AuraLayer.ai for your audience — plus a 50% recurring affiliate commission for 12 months.\n\nProduct: https://auralayer.ai\nAffiliate signup: https://auralayer-ai.getrewardful.com/signup\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'editorial@contentmarketinginstitute.com',subject:'Tool pitch: AuraLayer.ai — AI orchestration for content marketing teams',body:'Hi CMI team,\n\nPitching AuraLayer.ai for your content marketing audience — connects every AI tool in a content workflow. Launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'},
  {to:'tips@searchenginejournal.com',subject:'Tool pitch: AuraLayer.ai — AI orchestration for SEO and content teams',body:'Hi SEJ team,\n\nPitching AuraLayer.ai for your SEO audience — AI orchestration for content teams, launching May 1, 2026.\n\nProduct: https://auralayer.ai\nDeck: https://auralayer.ai/deck\n\nBest,\nManny A.\nsupport@auralayer.ai\nhttps://auralayer.ai'}
];

function toHtml(text) {
  var html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html = html.replace(/(https?:\/\/[^\s]+)/g, function(url) {
    var clean = url.replace(/[.,;:!?)]+$/, '');
    var trail = url.slice(clean.length);
    return '<a href="' + clean + '" style="color:#C9A84C;text-decoration:none">' + clean + '</a>' + trail;
  });
  html = '<p style="margin:0 0 14px">' + html.replace(/\n\n/g,'</p><p style="margin:0 0 14px">').replace(/\n/g,'<br>') + '</p>';
  return '<div style="font-family:Arial,sans-serif;font-size:15px;line-height:1.7;color:#111111;max-width:580px">' + html + '</div>';
}

function renderList() {
  document.getElementById('draftList').innerHTML = drafts.map(function(d,i) {
    return '<div class="draft-item' + (selectedIdx===i?' selected':'') + (sentSet.has(i)?' sent':'') + '" onclick="selectDraft(' + i + ')">' +
      '<div class="draft-to">' + d.to + (sentSet.has(i)?'<span class="sent-tag">sent</span>':'') + '</div>' +
      '<div class="draft-subj">' + d.subject + '</div></div>';
  }).join('');
}

function selectDraft(i) {
  selectedIdx = i;
  renderList();
  var d = drafts[i];
  document.getElementById('toField').value = d.to;
  document.getElementById('subjectField').value = d.subject;
  document.getElementById('bodyField').value = d.body;
  document.getElementById('composePanel').style.display = 'block';
  document.getElementById('status').style.display = 'none';
  document.getElementById('sendBtn').textContent = 'Send via Resend';
  document.getElementById('sendBtn').disabled = false;
}

async function sendEmail() {
  var to = document.getElementById('toField').value.trim();
  var subject = document.getElementById('subjectField').value.trim();
  var plainBody = document.getElementById('bodyField').value.trim();
  var fromName = document.getElementById('fromName').value.trim() || 'Manny A.';
  if (!to || !subject || !plainBody) { showStatus('error','Please fill in all fields.'); return; }
  var btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Sending...';
  showStatus('loading','Sending...');
  try {
    var res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: to, subject: subject, fromName: fromName, html: toHtml(plainBody), text: plainBody })
    });
    var data = await res.json();
    if (res.ok && data.success) {
      showStatus('success', 'Sent to ' + to);
      sentSet.add(selectedIdx);
      renderList();
      btn.textContent = 'Sent!';
      setTimeout(function() { btn.disabled=false; btn.textContent='Send via Resend'; }, 3000);
    } else {
      showStatus('error', data.error || 'Send failed.');
      btn.disabled=false; btn.textContent='Send via Resend';
    }
  } catch(e) {
    showStatus('error', 'Error: ' + e.message);
    btn.disabled=false; btn.textContent='Send via Resend';
  }
}

function showStatus(type, msg) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

renderList();
</script>
</body>
</html>
